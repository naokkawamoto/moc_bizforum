<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アクティビティログ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css">
  <style>
    .small-text { font-size: 0.85rem; }
    .section-card { margin-bottom: 1.5rem; }
    .card-header-actions { background-color: #e9ecef; color: #212529; }
    .log-url { font-size: 0.75rem; color: #495057; word-break: break-all; }
    .pagination-info { font-size: 0.8rem; color: #6c757d; }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <div class="container-fluid mt-4 px-4">
    <div class="row">
      <main class="col px-3" style="padding-bottom: 80px;">
        <h1 class="h4 mb-2 fw-bold">アクティビティログ</h1>
        <p class="text-muted small mb-3">ユーザーの画面遷移・操作を記録し、監査・不正検知に利用します（モック：ダミーデータ約20件、1ページあたり最大50件表示）。</p>

        <div class="card section-card">
          <div class="card-header py-2 card-header-actions">
            <span class="fw-bold">検索条件</span>
          </div>
          <div class="card-body">
            <form id="searchForm" class="row g-3 align-items-end">
              <div class="col-md-3 col-lg-2">
                <label for="filterStart" class="form-label small mb-1">開始日時</label>
                <input type="datetime-local" class="form-control form-control-sm" id="filterStart" step="60">
              </div>
              <div class="col-md-3 col-lg-2">
                <label for="filterEnd" class="form-label small mb-1">終了日時</label>
                <input type="datetime-local" class="form-control form-control-sm" id="filterEnd" step="60">
              </div>
              <div class="col-md-2 col-lg-2">
                <label for="filterName" class="form-label small mb-1">名前</label>
                <input type="text" class="form-control form-control-sm" id="filterName" placeholder="部分一致" autocomplete="off">
              </div>
              <div class="col-md-3 col-lg-3">
                <label for="filterPage" class="form-label small mb-1">ページ名・URL</label>
                <input type="text" class="form-control form-control-sm" id="filterPage" placeholder="部分一致" autocomplete="off">
              </div>
              <div class="col-md-12 col-lg-3 d-flex flex-wrap gap-2">
                <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search me-1"></i>検索</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="btnReset">条件クリア</button>
              </div>
            </form>
          </div>
        </div>

        <div class="card section-card">
          <div class="card-header py-2 card-header-actions d-flex flex-wrap justify-content-between align-items-center gap-2">
            <span class="fw-bold">ログ一覧</span>
            <span class="pagination-info mb-0" id="paginationSummary">—</span>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover table-bordered small-text mb-0">
                <thead class="table-light">
                  <tr>
                    <th style="width: 9rem;">日時</th>
                    <th style="width: 8rem;">名前</th>
                    <th>ページ名（URL）</th>
                  </tr>
                </thead>
                <tbody id="logTableBody">
                </tbody>
              </table>
            </div>
          </div>
          <div class="card-footer py-2 d-flex flex-wrap justify-content-between align-items-center gap-2">
            <span class="small text-muted mb-0">1ページあたり <strong>50</strong> 件まで表示</span>
            <nav aria-label="ページ送り">
              <ul class="pagination pagination-sm mb-0" id="logPagination"></ul>
            </nav>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script>
    fetch('user_header.html').then(r => r.text()).then(html => { var el = document.getElementById('header-container'); if (el) el.innerHTML = html; }).catch(function(){});
    fetch('user_footer.html').then(r => r.text()).then(html => { var el = document.getElementById('footer-container'); if (el) el.innerHTML = html; }).catch(function(){});

    var PAGE_SIZE = 50;

    /* ダミーログ（ISO日時・表示用ラベル・URL） */
    var LOG_SEED = [
      { at: '2026-04-08T09:12:00', name: '高橋 三郎', page: 'イベント一覧', url: 'user_project_list.html' },
      { at: '2026-04-08T09:18:00', name: '高橋 三郎', page: 'イベント管理（トップ）', url: 'user_project_detail.html' },
      { at: '2026-04-08T09:45:00', name: '佐藤 花子', page: '来場、入退場管理', url: 'user_project_detail_report.html' },
      { at: '2026-04-08T10:02:00', name: '佐藤 花子', page: '入場者詳細', url: 'user_visitor_detail.html' },
      { at: '2026-04-08T10:35:00', name: '鈴木 次郎', page: 'メール管理', url: 'user_project_detail_mail.html' },
      { at: '2026-04-08T11:05:00', name: '田中 美咲', page: '来場者・名札管理', url: 'user_project_detail_mail_print.html' },
      { at: '2026-04-08T11:42:00', name: '田中 美咲', page: 'イベント一覧', url: 'user_project_list.html' },
      { at: '2026-04-08T13:08:00', name: '伊藤 翔', page: '社内担当者設定', url: 'user_settings_staff.html' },
      { at: '2026-04-08T13:55:00', name: '渡辺 智子', page: 'イベント管理（トップ）', url: 'user_project_detail.html' },
      { at: '2026-04-08T14:22:00', name: '渡辺 智子', page: '来場、入退場管理', url: 'user_project_detail_report.html' },
      { at: '2026-04-08T14:48:00', name: '中村 健', page: '入場者詳細', url: 'user_visitor_detail.html' },
      { at: '2026-04-08T15:15:00', name: '小林 愛', page: 'メール管理', url: 'user_project_detail_mail.html' },
      { at: '2026-04-08T15:40:00', name: '高橋 三郎', page: '来場者・名札管理', url: 'user_project_detail_mail_print.html' },
      { at: '2026-04-08T16:05:00', name: '佐藤 花子', page: 'イベント管理（トップ）', url: 'user_project_detail.html' },
      { at: '2026-04-08T16:33:00', name: '鈴木 次郎', page: '来場、入退場管理', url: 'user_project_detail_report.html' },
      { at: '2026-04-07T18:20:00', name: '高橋 三郎', page: 'イベント一覧', url: 'user_project_list.html' },
      { at: '2026-04-07T18:45:00', name: '伊藤 翔', page: 'イベント管理（トップ）', url: 'user_project_detail.html' },
      { at: '2026-04-07T19:10:00', name: '田中 美咲', page: '入場者詳細', url: 'user_visitor_detail.html' },
      { at: '2026-04-07T19:38:00', name: '渡辺 智子', page: 'メール管理', url: 'user_project_detail_mail.html' },
      { at: '2026-04-07T20:05:00', name: '中村 健', page: '来場、入退場管理', url: 'user_project_detail_report.html' }
    ];

    function pad2(n) { return n < 10 ? '0' + n : '' + n; }

    function formatDateTime(iso) {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      return d.getFullYear() + '/' + pad2(d.getMonth() + 1) + '/' + pad2(d.getDate()) + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
    }

    function parseInputLocal(dtLocal) {
      if (!dtLocal || !dtLocal.trim()) return null;
      var t = new Date(dtLocal);
      return isNaN(t.getTime()) ? null : t.getTime();
    }

    function applyFilters(list) {
      var startMs = parseInputLocal(document.getElementById('filterStart').value);
      var endMs = parseInputLocal(document.getElementById('filterEnd').value);
      var nameQ = (document.getElementById('filterName').value || '').trim().toLowerCase();
      var pageQ = (document.getElementById('filterPage').value || '').trim().toLowerCase();

      return list.filter(function (row) {
        var t = new Date(row.at).getTime();
        if (startMs !== null && t < startMs) return false;
        if (endMs !== null && t > endMs) return false;
        if (nameQ && row.name.toLowerCase().indexOf(nameQ) === -1) return false;
        if (pageQ) {
          var hay = (row.page + ' ' + row.url).toLowerCase();
          if (hay.indexOf(pageQ) === -1) return false;
        }
        return true;
      });
    }

    var filtered = [];
    var currentPage = 1;

    function render() {
      var tbody = document.getElementById('logTableBody');
      tbody.innerHTML = '';
      var total = filtered.length;
      var pages = total === 0 ? 0 : Math.ceil(total / PAGE_SIZE);
      if (pages > 0 && currentPage > pages) currentPage = pages;
      var start = (currentPage - 1) * PAGE_SIZE;
      var slice = filtered.slice(start, start + PAGE_SIZE);

      slice.forEach(function (row) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + formatDateTime(row.at) + '</td>' +
          '<td>' + escapeHtml(row.name) + '</td>' +
          '<td><div>' + escapeHtml(row.page) + '</div><div class="log-url">' + escapeHtml(row.url) + '</div></td>';
        tbody.appendChild(tr);
      });

      var sumEl = document.getElementById('paginationSummary');
      if (total === 0) {
        sumEl.textContent = '該当 0 件';
      } else {
        var from = start + 1;
        var to = Math.min(start + PAGE_SIZE, total);
        sumEl.textContent = '全 ' + total + ' 件中 ' + from + '〜' + to + ' 件を表示（' + currentPage + ' / ' + pages + ' ページ）';
      }

      var pag = document.getElementById('logPagination');
      pag.innerHTML = '';
      if (pages <= 1) {
        return;
      }
      for (var p = 1; p <= pages; p++) {
        var li = document.createElement('li');
        li.className = 'page-item' + (p === currentPage ? ' active' : '');
        var a = document.createElement('a');
        a.className = 'page-link';
        a.href = '#';
        a.textContent = p;
        a.dataset.page = p;
        a.addEventListener('click', function (e) {
          e.preventDefault();
          currentPage = parseInt(e.currentTarget.dataset.page, 10);
          render();
        });
        li.appendChild(a);
        pag.appendChild(li);
      }
    }

    function escapeHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function runSearch() {
      filtered = applyFilters(LOG_SEED.slice().sort(function (a, b) {
        return new Date(b.at) - new Date(a.at);
      }));
      currentPage = 1;
      render();
    }

    document.getElementById('searchForm').addEventListener('submit', function (e) {
      e.preventDefault();
      runSearch();
    });
    document.getElementById('btnReset').addEventListener('click', function () {
      document.getElementById('filterStart').value = '';
      document.getElementById('filterEnd').value = '';
      document.getElementById('filterName').value = '';
      document.getElementById('filterPage').value = '';
      runSearch();
    });

    runSearch();
  </script>
</body>
</html>
