<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マイプロフィール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="header-container"></div>

  <div class="container-fluid mt-4 px-4">
    <h3 class="mb-3">マイプロフィール</h3>

    <div class="card">
      <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <span class="fw-bold">アカウント情報</span>
        <button type="button" class="btn btn-sm btn-primary" onclick="saveProfile()"><i class="bi bi-check-lg me-1"></i>保存</button>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">名前</label>
          <input type="text" class="form-control" id="profileName" value="山田 太郎" placeholder="名前">
        </div>
        <div class="mb-3">
          <label class="form-label">メール</label>
          <input type="email" class="form-control" id="profileEmail" value="yamada.taro@example.com" placeholder="メールアドレス">
        </div>
        <div class="mb-3">
          <label class="form-label">パスワード</label>
          <input type="password" class="form-control" id="profilePassword" value="********" placeholder="********" readonly>
          <div class="mt-2">
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="forgotPassword()">
              <i class="bi bi-key me-1"></i>パスワード忘れ
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <a href="user_project_list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>一覧に戻る</a>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script>
    fetch('user_header.html').then(r => r.text()).then(html => { var el = document.getElementById('header-container'); if (el) el.innerHTML = html; }).catch(function(){});
    fetch('user_footer.html').then(r => r.text()).then(html => { var el = document.getElementById('footer-container'); if (el) el.innerHTML = html; }).catch(function(){});

    function saveProfile() {
      var name = document.getElementById('profileName').value.trim();
      var email = document.getElementById('profileEmail').value.trim();
      if (!name) { alert('名前を入力してください。'); return; }
      if (!email) { alert('メールを入力してください。'); return; }
      alert('プロフィールを保存しました。\n※実際の実装ではサーバーに送信します。');
    }

    function forgotPassword() {
      alert('パスワード再設定用のメールを送信しました。\n※実際の実装ではメール送信処理を行います。');
    }
  </script>
</body>
</html>
