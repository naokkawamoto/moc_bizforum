<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VIP来場のお知らせ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../style.css">
  <style>
    .sidebar { max-height: 80vh; overflow-y: auto; }
    .col-fixed { padding-left: 0; padding-right: 0; }
    .small-text { font-size: 0.75rem; }
    .notice-item { padding: 0.75rem 1rem; border-bottom: 1px solid #dee2e6; }
    .notice-item:last-child { border-bottom: none; }
    .notice-item.unread { background-color: #f8f9fa; border-left: 3px solid #0d6efd; }
    .notice-timestamp { font-size: 0.7rem; color: #6c757d; }
    .notice-company-visitor { font-size: 0.9rem; font-weight: bold; }
    .notice-program-action { font-size: 0.8rem; }
    .filter-bar { background-color: #f8f9fa; border-radius: 0.25rem; padding: 0.75rem 1rem; }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <div class="container-fluid mt-4 px-4">
    <div class="row">
      <!-- 左サイドメニュー -->
      <nav class="col-fixed" style="width:240px;">
        <div class="sidebar px-2">
          <div class="list-group small-text">
            <a href="user_project_detail.html" class="list-group-item list-group-item-action">イベントトップ</a>
            <a href="user_project_detail_mail_print.html" class="list-group-item list-group-item-action">来場者・メール・名札</a>
            <a href="user_project_detail_report.html" class="list-group-item list-group-item-action">来場者・入退室</a>
            <a href="user_nortification.html" class="list-group-item list-group-item-action active d-flex justify-content-between align-items-center">VIP来場のお知らせ <span class="badge bg-danger">8</span></a>
          </div>
        </div>
      </nav>

      <!-- メインコンテンツ -->
      <main class="col px-3" style="padding-bottom: 80px;">
        <h4 class="mb-1 fw-bold">New Business Creation Strategy 2026 <i class="bi bi-star"></i></h4>
        <p class="mb-3 fw-bold">VIP来場のお知らせ</p>

        <!-- 担当者・未読 -->
        <div class="d-flex align-items-center gap-3 flex-wrap mb-3">
          <span class="small text-muted">担当者名:</span>
          <label class="mb-0 form-check d-flex align-items-center gap-1">
            <input type="checkbox" class="form-check-input staff-check" value="yamada" checked>
            <span class="small">山田 太郎</span>
          </label>
          <label class="mb-0 form-check d-flex align-items-center gap-1">
            <input type="checkbox" class="form-check-input staff-check" value="sato" checked>
            <span class="small">佐藤 花子</span>
          </label>
          <label class="mb-0 form-check d-flex align-items-center gap-1">
            <input type="checkbox" class="form-check-input staff-check" value="suzuki" checked>
            <span class="small">鈴木 次郎</span>
          </label>
          <span class="text-muted mx-1">|</span>
          <label class="mb-0 form-check d-flex align-items-center gap-1">
            <input type="checkbox" class="form-check-input" id="checkUnreadOnly">
            <span class="small">未読のみ</span>
          </label>
        </div>

        <!-- 来場者名で検索・プログラム絞り込み -->
        <div class="card mb-3">
          <div class="card-body filter-bar">
            <div class="row g-2 align-items-end flex-wrap">
              <div class="col-auto">
                <label class="form-label small mb-0">来場者名で検索</label>
                <div class="d-flex gap-1">
                  <input type="text" class="form-control form-control-sm" id="filterVisitor" placeholder="来場者名" style="min-width: 140px;">
                  <button type="button" class="btn btn-primary btn-sm" id="btnSearch">検索</button>
                </div>
              </div>
              <div class="col-auto">
                <label class="form-label small mb-0">プログラム絞り込み</label>
                <select class="form-select form-select-sm" id="filterProgram" style="min-width: 160px;">
                  <option value="">すべて</option>
                  <option value="基調講演">基調講演</option>
                  <option value="セッションA">セッションA</option>
                  <option value="セッションB">セッションB</option>
                  <option value="セッションC">セッションC</option>
                  <option value="セッションD">セッションD</option>
                  <option value="ダイアログ">ダイアログ</option>
                  <option value="ネットワーキング">ネットワーキング</option>
                </select>
              </div>
              <div class="col-auto">
                <button type="button" class="btn btn-outline-secondary btn-sm" id="btnReset">リセット</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 表示件数 -->
        <div class="d-flex flex-wrap align-items-center mb-2 gap-2">
          <label class="form-label small mb-0">表示</label>
          <select class="form-select form-select-sm" id="perPage" style="width: auto;">
            <option value="50" selected>50件</option>
            <option value="100">100件</option>
          </select>
          <span class="small text-muted" id="countLabel">全60件</span>
        </div>

        <!-- お知らせリスト -->
        <div class="card">
          <div class="list-group list-group-flush" id="noticeList"></div>
          <div class="card-footer py-2 d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="small text-muted" id="pageInfo">1-50件目を表示（1/2ページ）</span>
            <ul class="pagination pagination-sm mb-0" id="paginationList"></ul>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script src="user_nortification.js"></script>
</body>
</html>
