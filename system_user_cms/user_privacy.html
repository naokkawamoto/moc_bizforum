<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プライバシーポリシー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="header-container"></div>
  <div class="container-fluid mt-4 px-4">
    <h3 class="mb-3">プライバシーポリシー</h3>
    <div class="card">
      <div class="card-body">
        <p class="text-muted">プライバシーポリシーの内容がここに表示されます。</p>
      </div>
    </div>
    <div class="mt-3"><a href="user_project_list.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>一覧に戻る</a></div>
  </div>
  <div id="footer-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script>
    fetch('user_header.html').then(r=>r.text()).then(html=>{var e=document.getElementById('header-container');if(e)e.innerHTML=html;});
    fetch('user_footer.html').then(r=>r.text()).then(html=>{var e=document.getElementById('footer-container');if(e)e.innerHTML=html;});
  </script>
</body>
</html>
