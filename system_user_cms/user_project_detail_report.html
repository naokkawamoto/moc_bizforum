<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベント管理（来場者・入退出）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css">
  <style>
    .sidebar { max-height: 80vh; overflow-y: auto; }
    .col-fixed { padding-left: 0; padding-right: 0; }
    .small-text { font-size: 0.75rem; }
    .visitor-table { font-size: 0.8rem; }
    .visitor-table th { background-color: #f8f9fa; white-space: nowrap; }
    .visitor-row { cursor: pointer; }
    .visitor-row:hover { background-color: #f1f3f5; }
    .staff-link { text-decoration: none; font-weight: 500; }
    .staff-link:hover { text-decoration: underline; }
    .badge-join { background-color: #198754; }
    .badge-nojoin { background-color: #6c757d; }
    .badge-status-joining { background-color: #dc3545; color: #fff; animation: blink-red 1s ease-in-out infinite; }
    .badge-status-done { background-color: #198754; color: #fff; }
    .badge-status-none { background-color: #6c757d; color: #fff; }
    @keyframes blink-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .filter-bar { background-color: #f8f9fa; border-radius: 0.25rem; padding: 0.75rem 1rem; }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <div class="container-fluid mt-4 px-4">
    <div class="row">
      <nav class="col-fixed" style="width:240px;">
        <div class="sidebar px-2">
          <div class="list-group small-text">
            <a href="user_project_detail.html" class="list-group-item list-group-item-action">イベントトップ</a>
            <a href="user_project_detail_mail_print.html" class="list-group-item list-group-item-action">来場者・メール・名札</a>
            <a href="user_project_detail_report.html" class="list-group-item list-group-item-action active">来場者・入退室</a>
            <a href="user_nortification.html" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">VIP来場のお知らせ <span class="badge bg-danger">8</span></a>
          </div>
        </div>
      </nav>

      <main class="col px-3" style="padding-bottom: 80px;">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
          <div>
            <h4 class="mb-0 fw-bold">New Business Creation Strategy 2026 <i class="bi bi-star"></i></h4>
            <p class="mb-0 fw-bold">来場者・入退室</p>
          </div>
          <span class="fw-bold" style="font-size: 1.25rem;">2026年3月5日（木）13:00～17:40</span>
        </div>
        <p class="text-muted small mb-3">来場者・入退出一覧（社内担当者は複数の参加者を担当します）</p>

        <!-- 絞り込み -->
        <div class="card mb-3">
          <div class="card-body filter-bar">
            <div class="row g-2 align-items-end flex-wrap">
              <div class="col-auto">
                <label class="form-label small mb-0">来場者名で検索</label>
                <input type="text" class="form-control form-control-sm" id="filterName" placeholder="来場者名" style="min-width: 140px;">
              </div>
              <div class="col-auto">
                <label class="form-label small mb-0">担当者絞り込み</label>
                <select class="form-select form-select-sm" id="filterStaff" style="min-width: 160px;">
                  <option value="">すべて</option>
                  <option value="yamada">山田 太郎</option>
                  <option value="sato">佐藤 花子</option>
                  <option value="suzuki">鈴木 次郎</option>
                </select>
              </div>
              <div class="col-auto">
                <label class="form-label small mb-0">セッション絞り込み</label>
                <select class="form-select form-select-sm" id="filterSession" style="min-width: 160px;">
                  <option value="">すべて</option>
                  <option value="keynote">基調講演 参加</option>
                  <option value="session_a">セッションA 参加</option>
                  <option value="session_b">セッションB 参加</option>
                  <option value="session_c">セッションC 参加</option>
                  <option value="session_d">セッションD 参加</option>
                  <option value="dialog">ダイアログセッション 参加</option>
                  <option value="networking">ネットワーキング 参加</option>
                </select>
              </div>
              <div class="col-auto">
                <button type="button" class="btn btn-primary btn-sm" id="btnApply">適用</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="btnReset">リセット</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 表示件数・ページネーション用 -->
        <div class="d-flex flex-wrap align-items-center mb-2 gap-2">
          <label class="form-label small mb-0">表示</label>
          <select class="form-select form-select-sm" id="perPage" style="width: auto;">
            <option value="50" selected>50件</option>
            <option value="100">100件</option>
          </select>
        </div>

        <!-- 一覧テーブル -->
        <div class="card">
          <div class="card-header py-2 d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="fw-bold">来場者一覧</span>
            <div class="d-flex align-items-center gap-2">
              <button type="button" class="btn btn-success px-3 py-2 fw-bold" disabled><i class="bi bi-file-earmark-spreadsheet me-2"></i>CSV</button>
              <button type="button" class="btn btn-danger px-3 py-2 fw-bold" disabled><i class="bi bi-file-earmark-pdf me-2"></i>PDF</button>
              <span class="text-white small fw-bold bg-dark px-2 py-1 rounded" id="countLabel">全20件</span>
            </div>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-bordered visitor-table mb-0" id="visitorTable">
                <thead>
                  <tr>
                    <th style="width: 70px;">userID</th>
                    <th style="min-width: 100px;">来場者名</th>
                    <th style="min-width: 140px;">会社名</th>
                    <th style="min-width: 110px;">社内担当者名</th>
                    <th style="width: 70px;" class="text-center">来場</th>
                    <th style="width: 60px;" class="text-center">VIP</th>
                    <th style="width: 72px;" class="text-center">基調講演</th>
                    <th style="width: 72px;" class="text-center">セッションA</th>
                    <th style="width: 72px;" class="text-center">セッションB</th>
                    <th style="width: 72px;" class="text-center">セッションC</th>
                    <th style="width: 72px;" class="text-center">セッションD</th>
                    <th style="width: 72px;" class="text-center">ダイアログ</th>
                    <th style="width: 80px;" class="text-center">ネットワーキング</th>
                  </tr>
                </thead>
                <tbody id="visitorTbody">
                </tbody>
              </table>
            </div>
          </div>
          <div class="card-footer py-2 d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="small text-muted" id="pageInfo">1-20件目を表示（1/5ページ）</span>
            <ul class="pagination pagination-sm mb-0" id="paginationList"></ul>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script src="user_project_detail_report.js"></script>
</body>
</html>
