<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>担当者別詳細</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="header-container"></div>

  <div class="container-fluid mt-4 px-4">
    <div class="row">
      <nav class="col-fixed" style="width:240px;">
        <div class="list-group list-group-flush small">
          <a href="user_project_detail.html" class="list-group-item list-group-item-action">イベントトップ</a>
          <a href="user_project_detail_report.html" class="list-group-item list-group-item-action">来場者・入退室</a>
          <a href="user_project_detail_schedule.html" class="list-group-item list-group-item-action">プログラム詳細</a>
          <a href="user_project_detail_overview.html" class="list-group-item list-group-item-action">イベント概要</a>
        </div>
      </nav>
      <main class="col px-3" style="padding-bottom: 80px;">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="user_project_detail.html">イベントトップ</a></li>
            <li class="breadcrumb-item"><a href="user_project_detail_report.html">来場者・入退出</a></li>
            <li class="breadcrumb-item active" aria-current="page">担当者別</li>
          </ol>
        </nav>
        <h4 class="mb-3">担当者別詳細</h4>
        <div class="card">
          <div class="card-body">
            <p class="text-muted mb-2">担当者ID: <span id="staffId">—</span></p>
            <p class="mb-0">このページのコンテンツは後で定義します。（担当者に紐づくセミナー参加者一覧などを表示予定）</p>
          </div>
        </div>
        <a href="user_project_detail_report.html" class="btn btn-outline-secondary mt-3">来場者一覧に戻る</a>
      </main>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script>
    fetch('user_header.html').then(r => r.text()).then(html => document.getElementById('header-container').innerHTML = html);
    fetch('user_footer.html').then(r => r.text()).then(html => document.getElementById('footer-container').innerHTML = html);
    (function () {
      var params = new URLSearchParams(location.search);
      var id = params.get('id') || '—';
      var el = document.getElementById('staffId');
      if (el) el.textContent = id;
    })();
  </script>
</body>
</html>
