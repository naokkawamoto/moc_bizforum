<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>当日来場者登録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css">
  <style>
    .section-card { margin-bottom: 1.5rem; }
    .card-header-actions { background-color: #e9ecef; color: #212529; }
    .info-table { font-size: 0.9rem; }
    .info-table th { background-color: #f8f9fa; width: 14rem; max-width: 40%; font-weight: 600; vertical-align: middle; }
    .info-table td { vertical-align: middle; }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <div class="container-fluid mt-4 px-4">
    <div class="row">
      <main class="col-12 px-3" style="padding-bottom: 80px;">
        <div class="bg-dark text-white px-3 py-3 mb-4">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h4 class="mb-0 fw-bold">New Business Creation Strategy 2026 <span class="fs-6 fw-normal text-white-50 ms-2">NBCS2026-M0305</span></h4>
            <span class="text-white text-end mb-0 ms-auto" style="font-size: 1rem; white-space: nowrap;">2026年3月5日（木）13:00～17:40</span>
          </div>
        </div>

        <nav aria-label="breadcrumb" class="mb-3">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="user_project_detail_report.html">来場、入退場管理</a></li>
            <li class="breadcrumb-item active" aria-current="page">当日来場者登録</li>
          </ol>
        </nav>

        <div class="card section-card">
          <div class="card-header py-2 card-header-actions">
            <span class="fw-bold">基本情報（当日登録）</span>
          </div>
          <div class="card-body p-3">
            <table class="table table-bordered info-table mb-0">
              <tbody>
                <tr>
                  <th>イベント識別番号</th>
                  <td><input type="text" class="form-control form-control-sm" id="userid" value="U101"></td>
                </tr>
                <tr>
                  <th>会社名</th>
                  <td><input type="text" class="form-control form-control-sm" id="company" placeholder="例：株式会社サンプル"></td>
                </tr>
                <tr>
                  <th>部門</th>
                  <td><input type="text" class="form-control form-control-sm" id="dept" placeholder="例：マーケティング部"></td>
                </tr>
                <tr>
                  <th>役職</th>
                  <td><input type="text" class="form-control form-control-sm" id="jobTitle" placeholder="例：部長"></td>
                </tr>
                <tr>
                  <th>氏名</th>
                  <td><input type="text" class="form-control form-control-sm" id="name" placeholder="例：田中 一郎"></td>
                </tr>
                <tr>
                  <th>姓（カナ）</th>
                  <td><input type="text" class="form-control form-control-sm" id="kanaLast" placeholder="例：タナカ"></td>
                </tr>
                <tr>
                  <th>名（カナ）</th>
                  <td><input type="text" class="form-control form-control-sm" id="kanaFirst" placeholder="例：イチロウ"></td>
                </tr>
                <tr>
                  <th>メールアドレス</th>
                  <td><input type="email" class="form-control form-control-sm" id="email" placeholder="例：guest101@example.com"></td>
                </tr>
                <tr>
                  <th>営業担当者</th>
                  <td>
                    <select class="form-select form-select-sm" id="staffId">
                      <option value="yamada">山田 太郎</option>
                      <option value="sato">佐藤 花子</option>
                      <option value="suzuki">鈴木 次郎</option>
                    </select>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="d-flex gap-2">
          <a href="user_project_detail_report.html" class="btn btn-outline-secondary">キャンセル</a>
          <button type="button" class="btn btn-primary" id="btnSaveTodayVisitor">登録</button>
        </div>
      </main>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script>
    fetch('user_header.html').then(function (r) { return r.text(); }).then(function (html) {
      var el = document.getElementById('header-container');
      if (el) el.innerHTML = html;
    }).catch(function () {});
    fetch('user_footer.html').then(function (r) { return r.text(); }).then(function (html) {
      var el = document.getElementById('footer-container');
      if (el) el.innerHTML = html;
    }).catch(function () {});

    var btnSave = document.getElementById('btnSaveTodayVisitor');
    if (btnSave) {
      btnSave.addEventListener('click', function () {
        var userid = (document.getElementById('userid').value || 'U101').trim();
        var company = (document.getElementById('company').value || '').trim();
        var dept = (document.getElementById('dept').value || '').trim();
        var jobTitle = (document.getElementById('jobTitle').value || '').trim();
        var name = (document.getElementById('name').value || '').trim();
        var kanaLast = (document.getElementById('kanaLast').value || '').trim();
        var kanaFirst = (document.getElementById('kanaFirst').value || '').trim();
        var email = (document.getElementById('email').value || '').trim();
        var staffSelect = document.getElementById('staffId');
        var staffName = staffSelect && staffSelect.options[staffSelect.selectedIndex] ? staffSelect.options[staffSelect.selectedIndex].text : '';

        var params = new URLSearchParams();
        params.set('userid', userid || 'U101');
        if (company) params.set('company', company);
        if (dept) params.set('dept', dept);
        if (jobTitle) params.set('jobTitle', jobTitle);
        if (name) params.set('name', name);
        if (kanaLast) params.set('kanaLast', kanaLast);
        if (kanaFirst) params.set('kanaFirst', kanaFirst);
        if (email) params.set('email', email);
        if (staffName) params.set('staffName', staffName);
        location.href = 'user_visitor_detail_today_registered.html?' + params.toString();
      });
    }
  </script>
</body>
</html>
