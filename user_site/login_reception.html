<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>受付／VIP管理アプリ ログイン（ビジネスフォーラム）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../brand.css">
  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; min-height: 100%; background: #f5f5f5; }
    .app-wrap { max-width: 393px; min-height: 100vh; margin: 0 auto; background: #fff; display: flex; flex-direction: column; }
    .app-header-simple { display: flex; align-items: center; justify-content: center; background: var(--header-footer-brand); color: #fff; font-size: 0.95rem; font-weight: bold; padding: 1rem 0.75rem; }
    .login-body { flex: 1; padding: 1.5rem 1.25rem 2rem; display: flex; flex-direction: column; justify-content: flex-start; }
    .login-card { background: #fff; border-radius: 12px; padding: 1.5rem 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .login-card .form-label { font-weight: 600; color: #333; }
    .login-card .form-control { font-size: 1rem; padding: 0.85rem 1rem; border-radius: 8px; }
    .btn-login { font-size: 1.1rem; padding: 0.9rem; font-weight: 600; border-radius: 8px; }
    .login-card-title { font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 1.25rem; color: #212529; }
  </style>
</head>
<body>
  <div class="app-wrap">
    <header class="app-header-simple">ログイン</header>

    <main class="login-body">
      <div class="login-card mb-3">
        <h2 class="login-card-title">受付／VIP管理アプリ ログイン（ビジネスフォーラム）</h2>
        <form id="loginFormReception" action="#" method="post" novalidate>
          <div class="mb-4">
            <label for="loginEmailReception" class="form-label">メールアドレス</label>
            <input type="email" class="form-control" id="loginEmailReception" name="email" placeholder="メールアドレスを入力" autocomplete="email" inputmode="email">
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-login">ログイン</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var formReception = document.getElementById('loginFormReception');
      if (!formReception) return;
      formReception.addEventListener('submit', function (e) {
        e.preventDefault();
        window.location.href = 'site_project_list.html?fromLogin=1';
      });
    })();
  </script>
</body>
</html>
