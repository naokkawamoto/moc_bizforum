<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マイプロフィール - 受付アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../brand.css">
  <style>
    body, html { margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; width: 100%; max-width: 393px; margin: 0 auto; }
    .container-fluid { max-width: 393px; margin: 0 auto; padding-bottom: 80px; }
    .small-text { font-size: 0.7rem; }
    .event-list-header { width: 100%; max-width: 393px; margin: 0 auto; }
    .event-list-header h4 { font-size: 1rem; line-height: 1.3; }
    .form-label { font-size: 0.75rem; font-weight: bold; }
    .form-control { font-size: 0.8rem; }
    #footer-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 393px; z-index: 1000; background: #fff; }
  </style>
</head>
<body>
  <div class="container-fluid px-0">
    <div class="event-list-header bf-bg-brand text-white py-2 px-3 mb-2">
      <h4 class="mb-0 fw-bold text-white">イベント入退場受付アプリ</h4>
    </div>

    <div class="px-2">
      <h5 class="mb-3 mt-2 fw-bold">マイプロフィール</h5>

      <div class="card mb-3">
        <div class="card-header py-2 d-flex justify-content-between align-items-center">
          <span class="fw-bold small-text">アカウント情報</span>
          <button type="button" class="btn btn-sm btn-primary" onclick="saveProfile()" style="font-size: 0.7rem;"><i class="bi bi-check-lg me-1"></i>保存</button>
        </div>
        <div class="card-body p-2">
          <div class="mb-3">
            <label class="form-label">名前</label>
            <input type="text" class="form-control" id="profileName" value="山田 太郎" placeholder="名前">
          </div>
          <div class="mb-3">
            <label class="form-label">メール</label>
            <input type="email" class="form-control" id="profileEmail" value="yamada.taro@example.com" placeholder="メールアドレス">
          </div>
          <div class="mb-3">
            <label class="form-label">パスワード</label>
            <input type="password" class="form-control" id="profilePassword" value="********" placeholder="********" readonly>
            <div class="mt-2">
              <button type="button" class="btn btn-outline-secondary btn-sm" onclick="forgotPassword()" style="font-size: 0.7rem;">
                <i class="bi bi-key me-1"></i>パスワード忘れ
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-2">
        <a href="site_project_list.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>一覧に戻る</a>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script>
    fetch('site_footer_project_list.html')
      .then(r => r.text())
      .then(html => {
        var el = document.getElementById('footer-container');
        if (el) el.innerHTML = html;
      })
      .catch(function(){});

    function saveProfile() {
      var name = document.getElementById('profileName').value.trim();
      var email = document.getElementById('profileEmail').value.trim();
      if (!name) { alert('名前を入力してください。'); return; }
      if (!email) { alert('メールを入力してください。'); return; }
      alert('プロフィールを保存しました。');
    }

    function forgotPassword() {
      alert('パスワード再設定用のメールを送信しました。');
    }
  </script>
</body>
</html>
