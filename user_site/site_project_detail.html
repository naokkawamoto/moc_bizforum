<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベントトップ - 受付アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body, html { margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; width: 100%; max-width: 393px; margin: 0 auto; }
    .container-fluid { max-width: 393px; margin: 0 auto; padding-bottom: 80px; }
    .small-text { font-size: 0.7rem; }
    .info-table { font-size: 0.65rem; }
    .info-table th { background: #f8f9fa; width: 100px; }
    .event-banner { width: 100%; height: 180px; object-fit: contain; object-position: center; background: #f0f0f0; display: block; }
    .event-header { width: 100%; max-width: 393px; margin: 0 auto; }
    .event-header h4 { font-size: 1.1rem; line-height: 1.3; }
    #footer-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 393px; z-index: 1000; background: #fff; }
  </style>
</head>
<body>
  <div class="container-fluid px-0">
    <div class="event-header bg-dark text-white py-2 px-3 mb-2">
      <h4 class="mb-0 fw-bold text-white">New Business Creation Strategy 2026</h4>
    </div>

    <div class="px-2">
      <div class="card mb-2">
        <img src="../images/bizforumbanner.webp" class="event-banner" alt="イベントバナー">
        <div class="card-header py-1 small-text fw-bold">イベント概要</div>
        <div class="card-body p-2">
          <table class="table table-sm table-bordered info-table mb-2">
            <tbody>
              <tr><th>開催日時</th><td>2026年3月5日（木）13:00～17:40</td></tr>
              <tr><th>開催場所</th><td>会場開催（東京）</td></tr>
              <tr><th>来場予定数</th><td>150 名</td></tr>
              <tr><th>来場数実績</th><td class="fw-bold text-primary">82名</td></tr>
              <tr><th>セッション参加予定数</th><td>基調講演 150名 / セッションA 80名 / セッションB 70名 / ダイアログ 120名 / ネットワーキング 100名</td></tr>
              <tr><th>状況</th><td>受付中</td></tr>
            </tbody>
          </table>
          <div class="small-text fw-bold mb-1">担当者</div>
          <table class="table table-sm table-bordered info-table mb-0">
            <thead class="table-light"><tr><th>担当者名</th><th>役割</th><th>メール</th></tr></thead>
            <tbody>
              <tr><td>山田 太郎</td><td>受付</td><td>yamada.taro@example.com</td></tr>
              <tr><td>佐藤 花子</td><td>受付</td><td>sato.hanako@example.com</td></tr>
              <tr><td>鈴木 次郎</td><td>受付</td><td>suzuki.jiro@example.com</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('site_footer.html').then(r=>r.text()).then(html=>{var e=document.getElementById('footer-container');if(e)e.innerHTML=html;}).catch(function(){});
  </script>
</body>
</html>
