<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベントリスト - 受付アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../brand.css">
  <style>
    body, html { margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; }
    .container-fluid { max-width: 393px; margin: 0 auto; padding-bottom: 80px; }
    #footer-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 393px; z-index: 1000; background: #fff; }
    .event-list-header { width: 100%; max-width: 393px; margin: 0 auto; }
    .event-list-header h4 { font-size: 1rem; line-height: 1.3; }
    .event-list-header .event-header-logout { color: #fff; opacity: 0.92; line-height: 1; padding: 0.25rem; flex-shrink: 0; }
    .event-list-header .event-header-logout:hover, .event-list-header .event-header-logout:focus { color: #fff; opacity: 1; }
    #panelView { max-width: 100%; }
    .vip-event-block { margin-bottom: 0.75rem; border: 1px solid #dee2e6; border-radius: 0.25rem; overflow: hidden; cursor: pointer; background: #fff; }
    .vip-event-block.row-ended { background-color: #e9ecef; }
    .vip-event-block.vip-row-link:hover { filter: brightness(0.97); }
    .vip-event-block.row-ended.vip-row-link:hover { filter: brightness(0.95); }
    .vip-list-page-title { font-size: 0.8rem; font-weight: 400; }
    .vip-event-table { width: 100%; max-width: 100%; font-size: 0.75rem; margin-bottom: 0; table-layout: fixed; }
    .vip-event-table caption { caption-side: top; padding: 0.5rem 0.6rem; font-size: 0.8rem; font-weight: 600; text-align: left; line-height: 1.35; color: #fff; border-bottom: 1px solid #333; background: #000; }
    .vip-event-block.row-ended .vip-event-table caption { background: #000; color: #fff; }
    .vip-event-table th, .vip-event-table td { vertical-align: top; padding: 0.4rem 0.55rem; word-break: break-word; overflow-wrap: break-word; white-space: normal; }
    .vip-event-table th { width: 6.2rem; font-size: 0.68rem; font-weight: 600; background: #f8f9fa; border-color: #dee2e6; }
    .vip-event-block.row-ended .vip-event-table tbody th { background: #e3e6ea; }
    .vip-event-block.row-ended .vip-event-table tbody td { background-color: transparent; }
  </style>
</head>
<body>
  <div class="container-fluid px-0">
    <div class="event-list-header bf-bg-brand text-white py-2 px-3 mb-2 d-flex align-items-center justify-content-between gap-2">
      <h4 class="mb-0 fw-bold text-white flex-grow-1 text-truncate me-1" style="min-width: 0;">イベント入退場受付アプリ</h4>
      <a href="../index.html" class="event-header-logout text-decoration-none" aria-label="ログアウト" title="ログアウト">
        <i class="bi bi-box-arrow-right" style="font-size: 1.35rem;"></i>
      </a>
    </div>
  <div class="px-2">
    <h5 class="mb-2 mt-2 vip-list-page-title">イベントリスト</h5>

    <div id="panelView" class="vip-event-list">
      <!-- 開催終了を先頭・グレー（VIP一覧と同順・同データ構成） -->
      <div class="vip-event-block row-ended vip-row-link" role="link" tabindex="0" data-href="site_project_detail.html" aria-label="経営DXフォーラム 2026、詳細へ">
        <table class="table table-sm table-bordered mb-0 vip-event-table">
          <caption class="mb-0">経営DXフォーラム 2026</caption>
          <tbody>
            <tr><th scope="row">開催日時</th><td>2026/03/09<br>14:30～17:45</td></tr>
            <tr><th scope="row">開催場所</th><td>東京都千代田区</td></tr>
            <tr><th scope="row">担当</th><td>佐藤花子</td></tr>
            <tr><th scope="row">登録/入室</th><td>85名 / 82</td></tr>
          </tbody>
        </table>
      </div>

      <div class="vip-event-block vip-row-link" role="link" tabindex="0" data-href="site_project_detail.html" aria-label="New Business Creation Strategy 2026、詳細へ">
        <table class="table table-sm table-bordered mb-0 vip-event-table">
          <caption class="mb-0">New Business Creation Strategy 2026</caption>
          <tbody>
            <tr><th scope="row">開催日時</th><td>2026/03/05<br>13:00～17:40</td></tr>
            <tr><th scope="row">開催場所</th><td>会場開催（東京）</td></tr>
            <tr><th scope="row">担当</th><td>鈴木次郎</td></tr>
            <tr><th scope="row">登録/入室</th><td>0名 / 0</td></tr>
          </tbody>
        </table>
      </div>

      <div class="vip-event-block vip-row-link" role="link" tabindex="0" data-href="site_project_detail.html" aria-label="グローバル／グループ経営フォーラム 2026、詳細へ">
        <table class="table table-sm table-bordered mb-0 vip-event-table">
          <caption class="mb-0">グローバル／グループ経営フォーラム 2026</caption>
          <tbody>
            <tr><th scope="row">開催日時</th><td>2026/03/26<br>10:30～16:30</td></tr>
            <tr><th scope="row">開催場所</th><td>オンライン</td></tr>
            <tr><th scope="row">担当</th><td>山田太郎</td></tr>
            <tr><th scope="row">登録/入室</th><td>120名 / 0</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('site_footer_project_list.html').then(r=>r.text()).then(html=>{var e=document.getElementById('footer-container');if(e)e.innerHTML=html;}).catch(function(){});
    (function () {
      var panel = document.getElementById('panelView');
      if (!panel) return;
      function go(el) {
        var href = el.getAttribute('data-href');
        if (href) location.href = href;
      }
      panel.addEventListener('click', function (e) {
        var block = e.target.closest('.vip-row-link');
        if (block && panel.contains(block)) go(block);
      });
      panel.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        var block = e.target.closest('.vip-row-link');
        if (!block || !panel.contains(block)) return;
        e.preventDefault();
        go(block);
      });
    })();
  </script>
</body>
</html>
