<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読み取り - 基調講演 - 受付アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body, html { margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; width: 100%; max-width: 393px; margin: 0 auto; }
    .container-fluid { max-width: 393px; margin: 0 auto; padding-bottom: 80px; }
    .small-text { font-size: 0.7rem; }
    .info-table { font-size: 0.65rem; }
    .info-table th { background: #f8f9fa; width: 100px; }
    .read-ui-scan { min-height: 400px; background: #e9ecef; border-radius: 0.375rem; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #6c757d; font-size: 0.75rem; border: 2px dashed #0d6efd; }
    .read-ui-scan i { font-size: 3rem; margin-bottom: 0.5rem; color: #0d6efd; }
    .event-header { width: 100%; max-width: 393px; margin: 0 auto; }
    .event-header h4 { font-size: 1.1rem; line-height: 1.3; }
    #footer-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 393px; z-index: 1000; background: #fff; }
  </style>
</head>
<body>
  <div class="container-fluid px-0">
    <div class="event-header bg-dark text-white py-2 px-3 mb-2">
      <h4 class="mb-0 fw-bold text-white">New Business Creation Strategy 2026</h4>
    </div>

    <div class="px-2">
    <div class="card mb-2">
      <div class="card-header py-1 small-text fw-bold">プログラム名：基調講演</div>
      <div class="card-body p-2">
        <table class="table table-sm table-bordered info-table mb-0">
          <tbody>
            <tr><th>時間</th><td>13:00-13:30</td></tr>
            <tr><th>ROOM</th><td>メインホール</td></tr>
            <tr><th>講演タイトル</th><td>特別講演Ⅰ　社内企業家を生かす会社のあり方</td></tr>
            <tr><th>講演者</th><td>若林 直樹 氏</td></tr>
            <tr><th>入室予定数</th><td>150</td></tr>
            <tr><th>入室実績</th><td>0</td></tr>
            <tr><th>退室実績</th><td>0</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card mb-2">
      <div class="card-header py-1 small-text fw-bold">読み取りエリア</div>
      <div class="card-body p-2">
        <div class="read-ui-scan">
          <i class="bi bi-upc-scan"></i>
          <span>QRコード／バーコードを読み取る</span>
        </div>
      </div>
    </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('site_footer_reception.html').then(r=>r.text()).then(html=>{var e=document.getElementById('footer-container');if(e)e.innerHTML=html;}).catch(function(){});
  </script>
</body>
</html>
