<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読み取り - 基調講演退室 - 受付アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../brand.css">
  <style>
    html { height: 100%; }
    body.read-keynote-body {
      margin: 0;
      width: 100%;
      max-width: 393px;
      margin-left: auto;
      margin-right: auto;
      min-height: 100%;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff1f1;
    }
    .read-keynote-root { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
    .read-keynote-main { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; padding-left: 0.5rem; padding-right: 0.5rem; }
    .read-keynote-overview { flex: 0 0 auto; }
    .read-scan-block { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; margin-bottom: 0; }
    .read-ui-scan {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      position: relative;
      z-index: 1;
      overflow: hidden;
      isolation: isolate;
      border-radius: 0.375rem;
      background: #4a1414;
      border: 2px solid #dc3545;
    }
    .read-scan-mock-img { display: block; width: 100%; height: 100%; object-fit: contain; object-position: center center; pointer-events: none; position: relative; z-index: 0; }
    .read-scan-actions { position: absolute; inset: 0; z-index: 7; pointer-events: none; }
    .read-scan-actions-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.65rem;
      max-width: calc(100% - 1.5rem);
      pointer-events: auto;
    }
    .read-scan-hit-btn {
      margin: 0;
      padding: 0.65rem 1.15rem;
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.04em;
      color: #fff;
      background: #dc3545;
      border: 1px solid #dc3545;
      border-radius: 0.45rem;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.35), 0 4px 18px rgba(0, 0, 0, 0.55);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      min-width: 6.25rem;
      min-height: 2.65rem;
    }
    .read-scan-hit-btn:hover { background: #bb2d3b; color: #fff; }
    .read-complete-modal .modal-content { border-radius: 0.5rem; max-width: 340px; margin: 0 auto; }
    .read-complete-modal .btn-next { font-size: 1.1rem; padding: 0.9rem 1rem; background-color: var(--header-footer-brand, #E60012); border-color: var(--header-footer-brand, #E60012); }
    .read-complete-modal .btn-cancel { font-size: 1.05rem; padding: 0.9rem 1rem; }
    .read-complete-modal .modal-action-row { display: flex; gap: 0.5rem; }
    .read-complete-modal .modal-action-row > .btn { flex: 1 1 0; min-width: 0; }
    .event-header { width: 100%; max-width: 393px; margin: 0 auto; }
    .event-header h4 { font-size: 1.1rem; line-height: 1.3; }
    .event-header .event-header-back-btn {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.22rem 0.55rem;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 0.35rem;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
    }
    .event-header .event-header-back-btn:hover, .event-header .event-header-back-btn:focus { color: #fff; background: rgba(255, 255, 255, 0.14); }
    #footer-container { position: absolute; left: 0; right: 0; bottom: 0; width: 100%; z-index: 5; background: transparent; padding-bottom: env(safe-area-inset-bottom, 0px); }
    .read-ui-scan #footer-container .vip-footer-bar { border-radius: 0 0 0.3rem 0.3rem; }
    .overview-card { overflow: hidden; border-radius: 0.25rem; }
    .overview-event-title { background: #dc3545; color: #fff; font-size: 0.8rem; font-weight: 600; text-align: left; line-height: 1.35; padding: 0.5rem 0.65rem; border-bottom: 1px solid #b02a37; }
    .program-compact-card .card-body { padding: 0.5rem 0.65rem; }
    .program-compact-line { font-size: 0.78rem; line-height: 1.45; word-break: break-word; margin-bottom: 0; font-weight: 600; color: #212529; }
    .program-compact-stats { font-size: 0.68rem; color: #6c757d; margin-top: 0.35rem; line-height: 1.4; margin-bottom: 0; }
    .read-session-alert-tile {
      display: block;
      width: 100%;
      border-radius: 0.35rem;
      padding: 0.5rem 0.65rem;
      line-height: 1.4;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border: 1px solid transparent;
      transition: filter 0.15s ease;
    }
    .read-session-alert-tile:focus-visible { outline: 2px solid rgba(220, 53, 69, 0.45); outline-offset: 2px; }
    .read-session-alert-tile:active { filter: brightness(0.97); }
    .read-session-alert-tile--danger {
      color: #a50f0f;
      border-color: rgba(196, 18, 18, 0.45);
      background: rgba(196, 18, 18, 0.08);
    }
    .read-session-time-modal .modal-body p:last-child { margin-bottom: 0; }
  </style>
</head>
<body class="read-keynote-body">
  <div class="read-keynote-root">
    <div class="container-fluid px-0 flex-shrink-0">
      <div class="event-header bf-bg-brand text-white py-2 px-3 mb-2 d-flex align-items-center justify-content-between gap-2">
        <h4 class="mb-0 fw-bold text-white flex-grow-1 text-truncate" style="min-width: 0;">受付VIP管理アプリ</h4>
        <a href="site_project_detail.html" class="event-header-back-btn flex-shrink-0" aria-label="戻る" title="戻る">
          <i class="bi bi-arrow-left-short"></i>戻る
        </a>
      </div>
    </div>

    <div class="read-keynote-main">
      <div class="read-keynote-overview mb-2">
        <div class="card overview-card program-compact-card mb-0">
          <div class="overview-event-title">New Business Creation Strategy 2026</div>
          <div class="card-body">
            <p class="program-compact-line mb-0">13:00～13:30／基調講演／メインホール（退室）</p>
            <p class="program-compact-stats mb-0">入室0・退室0</p>
          </div>
        </div>
      </div>
      <button type="button" class="read-session-alert-tile read-session-alert-tile--danger mb-2" id="sessionOverdueAlertBtn" aria-haspopup="dialog" aria-controls="sessionOverdueExplainModal">
        セッション終了予定時間超過
      </button>

      <div class="read-scan-block">
        <div class="read-ui-scan" id="readScanArea">
          <img src="images/read_scan_area_mock.png" alt="" class="read-scan-mock-img" width="470" height="1024" decoding="async" loading="lazy">
          <div class="read-scan-actions">
            <div class="read-scan-actions-inner">
              <button type="button" class="read-scan-hit-btn" id="readCompleteBtn" aria-label="退室完了を表示">退室</button>
            </div>
          </div>
          <div id="footer-container"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade read-session-time-modal" id="sessionOverdueExplainModal" tabindex="-1" aria-labelledby="sessionOverdueExplainModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header border-0 pb-0">
          <h2 class="modal-title h5 fw-bold text-danger" id="sessionOverdueExplainModalTitle">セッション終了予定時間超過</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
        </div>
        <div class="modal-body pt-2">
          <p class="small text-muted mb-0">実装メモ：現在時刻 &gt; セッション終了予定時刻のときにバナー表示。延長時の扱いは別途。</p>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-danger w-100" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade read-complete-modal" id="readCompleteModal" tabindex="-1" aria-labelledby="readCompleteTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-body text-center py-4 px-3 position-relative">
          <button type="button" class="btn-close position-absolute top-0 end-0 mt-2 me-2" style="font-size: 0.6rem;" data-bs-dismiss="modal" aria-label="キャンセル"></button>
          <h2 class="h4 fw-bold mb-4" id="readCompleteTitle">退室完了</h2>
          <div class="text-start mb-3">
            <div class="small text-muted mb-1">社名</div>
            <div class="fs-6 fw-semibold">株式会社ビジネスフォーラム</div>
          </div>
          <div class="text-start mb-4">
            <div class="small text-muted mb-1">名前</div>
            <div class="fs-6 fw-semibold">山田 太郎</div>
          </div>
          <div class="modal-action-row">
            <button type="button" class="btn btn-outline-secondary btn-cancel fw-bold" data-bs-dismiss="modal">キャンセル</button>
            <button type="button" class="btn btn-primary btn-next fw-bold" data-bs-dismiss="modal">退室</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('site_footer_vip.html').then(function (r) { return r.text(); }).then(function (html) {
      var e = document.getElementById('footer-container');
      if (e) e.innerHTML = html;
    }).catch(function () {});
    (function () {
      var modalEl = document.getElementById('readCompleteModal');
      var completeBtn = document.getElementById('readCompleteBtn');
      if (!modalEl || typeof bootstrap === 'undefined') return;
      var modal = new bootstrap.Modal(modalEl);
      if (completeBtn) {
        completeBtn.addEventListener('click', function (e) {
          e.preventDefault();
          modal.show();
        });
      }
      var overdueExplainEl = document.getElementById('sessionOverdueExplainModal');
      var overdueAlertBtn = document.getElementById('sessionOverdueAlertBtn');
      if (overdueExplainEl && overdueAlertBtn) {
        var overdueExplainModal = new bootstrap.Modal(overdueExplainEl);
        overdueAlertBtn.addEventListener('click', function (e) {
          e.preventDefault();
          overdueExplainModal.show();
        });
      }
    })();
  </script>
</body>
</html>
