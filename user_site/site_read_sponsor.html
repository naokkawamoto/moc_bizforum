<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読み取り - 協賛社講演 - 受付アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body, html { margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; width: 100%; max-width: 393px; margin: 0 auto; }
    .container-fluid { max-width: 393px; margin: 0 auto; padding-bottom: 80px; }
    .small-text { font-size: 0.7rem; }
    .info-table { font-size: 0.65rem; }
    .info-table th { background: #f8f9fa; width: 100px; }
    .read-ui-scan { min-height: 200px; background: #e9ecef; border-radius: 0.375rem; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #6c757d; font-size: 0.75rem; border: 2px dashed #0d6efd; }
    .read-ui-scan i { font-size: 3rem; margin-bottom: 0.5rem; color: #0d6efd; }
    #footer-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 393px; z-index: 1000; background: #fff; }
  </style>
</head>
<body>
  <div class="container-fluid px-2">
    <div class="d-flex align-items-center gap-2 mt-2 mb-2">
      <a href="site_project_detail.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
      <h5 class="mb-0 small-text fw-bold">読み取り</h5>
    </div>

    <div class="card mb-2">
      <div class="card-header py-1 small-text fw-bold">プログラム情報</div>
      <div class="card-body p-2">
        <table class="table table-sm table-bordered info-table mb-0">
          <tbody>
            <tr><th>イベント名</th><td>New Business Creation Strategy 2026</td></tr>
            <tr><th>プログラム名</th><td>協賛社講演</td></tr>
            <tr><th>時間</th><td>13:30-14:00</td></tr>
            <tr><th>ROOM</th><td>メインホール</td></tr>
            <tr><th>講演タイトル</th><td>協賛社講演Ⅰ　AIを活用した新規事業</td></tr>
            <tr><th>講演者</th><td>阿部 拓貴 氏</td></tr>
            <tr><th>入室予定数</th><td>150</td></tr>
            <tr><th>入室実績</th><td>0</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card mb-2">
      <div class="card-header py-1 small-text fw-bold">読み取りエリア</div>
      <div class="card-body p-2">
        <div class="read-ui-scan">
          <i class="bi bi-upc-scan"></i>
          <span>QRコード／バーコードを読み取る</span>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('site_footer.html').then(r=>r.text()).then(html=>{var e=document.getElementById('footer-container');if(e)e.innerHTML=html;}).catch(function(){});
  </script>
</body>
</html>
